<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left"></div>
            <div class="header-center">
                <h1 class="header-title">Your Ticket</h1>
                <button class="share-btn" id="shareBtn" aria-label="Share ticket">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                </button>
            </div>
            <button class="close-btn" id="closeBtn" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </header>

        <!-- Ticket Card -->
        <div class="ticket-card">
            <!-- Top Section: Poster & Details -->
            <div class="ticket-top">
                <div class="poster-container">
                    <div class="poster-art">
                        <div class="poster-gradient"></div>
                        <div class="poster-title-art">O' Romeo</div>
                        <div class="poster-play-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="6,3 20,12 6,21"></polygon>
                            </svg>
                        </div>
                    </div>
                    <button class="watch-trailer-btn">Watch Trailer</button>
                </div>

                <div class="movie-details">
                    <h2 class="movie-title">O' Romeo <span class="movie-rating">(A)</span></h2>
                    <p class="movie-meta">Hindi, 2D</p>
                    <p class="movie-time">Sat, 14 Feb | 02:40 PM</p>
                    <p class="movie-venue">PVR: Inorbit, Cyberabad</p>
                </div>

                <div class="m-ticket-badge">
                    <span>M-Ticket</span>
                </div>
            </div>

            <!-- Support Banner -->
            <div class="support-banner">
                <span>Tap for support, details & more actions</span>
            </div>

            <!-- QR Section -->
            <div class="qr-section">
                <div class="qr-container">
                    <svg class="qr-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                        <rect width="100" height="100" fill="white"/>
                        <!-- Position Detection Patterns -->
                        <rect x="5" y="5" width="35" height="35" fill="black"/>
                        <rect x="10" y="10" width="25" height="25" fill="white"/>
                        <rect x="15" y="15" width="15" height="15" fill="black"/>
                        <rect x="60" y="5" width="35" height="35" fill="black"/>
                        <rect x="65" y="10" width="25" height="25" fill="white"/>
                        <rect x="70" y="15" width="15" height="15" fill="black"/>
                        <rect x="5" y="60" width="35" height="35" fill="black"/>
                        <rect x="10" y="65" width="25" height="25" fill="white"/>
                        <rect x="15" y="70" width="15" height="15" fill="black"/>
                        <!-- Data Area -->
                        <rect x="45" y="5" width="10" height="5" fill="black"/>
                        <rect x="45" y="15" width="5" height="10" fill="black"/>
                        <rect x="50" y="25" width="5" height="5" fill="black"/>
                        <rect x="45" y="35" width="10" height="5" fill="black"/>
                        <rect x="5" y="45" width="5" height="10" fill="black"/>
                        <rect x="15" y="45" width="10" height="5" fill="black"/>
                        <rect x="30" y="45" width="5" height="10" fill="black"/>
                        <rect x="40" y="45" width="10" height="5" fill="black"/>
                        <rect x="50" y="45" width="5" height="5" fill="black"/>
                        <rect x="60" y="45" width="10" height="5" fill="black"/>
                        <rect x="75" y="45" width="5" height="10" fill="black"/>
                        <rect x="85" y="45" width="10" height="5" fill="black"/>
                        <rect x="45" y="60" width="10" height="5" fill="black"/>
                        <rect x="45" y="70" width="5" height="10" fill="black"/>
                        <rect x="50" y="85" width="10" height="10" fill="black"/>
                        <rect x="60" y="60" width="5" height="5" fill="black"/>
                        <rect x="70" y="65" width="10" height="5" fill="black"/>
                        <rect x="85" y="60" width="5" height="15" fill="black"/>
                        <rect x="60" y="75" width="15" height="5" fill="black"/>
                        <rect x="70" y="85" width="5" height="10" fill="black"/>
                        <rect x="80" y="80" width="15" height="15" fill="black"/>
                    </svg>
                </div>

                <div class="qr-details">
                    <p class="ticket-count">1 Ticket(s)</p>
                    <p class="ticket-screen">SCREEN 11</p>
                    <p class="ticket-seat">QR-J13</p>
                    <p class="booking-id">BOOKING ID: T9AFDXQ</p>
                </div>
            </div>

            <!-- Cancellation Info -->
            <div class="info-banner">
                <p>Cancellation available : cut-off time of 20 minutes before showtime</p>
            </div>

            <!-- Footer Pricing -->
            <div class="ticket-footer">
                <span class="footer-label">Total Amount</span>
                <span class="footer-value">&#8377; 367.76</span>
            </div>
        </div>

        <!-- Find Venue Button -->
        <button class="find-venue-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>Find Venue</span>
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
